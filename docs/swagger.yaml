  /token/refresh:
    post:
      description: Exchanges a valid refresh token (from an HTTP-only cookie) for
        a new access token and a new refresh token. The used refresh token is revoked.
        This endpoint does not accept a request body.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully generated new token pair
          schema:
            $ref: '#/definitions/domain.TokensPair'
        "400":
          description: Invalid request payload or malformed refresh token
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: 'Unauthorized: Invalid, expired, or malformed refresh token'
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "403":
          description: 'Forbidden: Refresh token has been revoked or is otherwise
            not allowed'
          schema:
            $ref: '#/definitions/domain.ForbiddenError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      summary: Update access and refresh tokens
      tags:
      - Token
schemes:
- https
- http
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
