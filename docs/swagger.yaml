basePath: /api/v1/
definitions:
  app.HealthCheckResponse:
    properties:
      status:
        example: healthy
        type: string
      timestamp:
        example: "2023-10-27T10:00:00Z"
        type: string
    type: object
  domain.BadRequestError:
    properties:
      code:
        example: 400
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: Input validation failed
        type: string
    type: object
  domain.ChangePassReq:
    description: Change password request payload
    properties:
      current_password:
        description: |-
          The specialist's current password.
          required: true
          example: MySecretPassword123!
        example: MySecretPassword123!
        type: string
      new_password:
        description: |-
          The new password for the specialist account.
          Must be at least 12 characters long.
          Must contain at least one uppercase letter, one lowercase letter, one number, and one special character from @$!%*?&.
          required: true
          minLength: 12
          maxLength: 255
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{12,255}$"
          example: NewStr0ngP@ssw0rd!
        example: NewStr0ngP@ssw0rd!
        minLength: 12
        type: string
    required:
    - current_password
    - new_password
    type: object
  domain.ConflictError:
    properties:
      code:
        example: 409
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: A resource with this identifier already exists
        type: string
    type: object
  domain.FieldError:
    properties:
      field:
        example: email
        type: string
      message:
        example: must be a valid email address
        type: string
    type: object
  domain.ForbiddenError:
    properties:
      code:
        example: 403
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: You do not have permission to access this resource
        type: string
    type: object
  domain.InternalServerError:
    properties:
      code:
        example: 500
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: An unexpected error occurred on the server
        type: string
    type: object
  domain.LoginReq:
    description: User login request payload
    properties:
      email:
        description: |-
          Email address of the user.
          required: true
          format: email
          example: user@example.com
        example: user@example.com
        type: string
      password:
        description: |-
          Password for the user account.
          required: true
          example: MySecretPassword123!
        example: MySecretPassword123!
        type: string
    required:
    - email
    - password
    type: object
  domain.NotFoundError:
    properties:
      code:
        example: 404
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: Specialist account not found
        type: string
    type: object
  domain.PayloadTooLargeError:
    properties:
      code:
        example: 413
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: The request payload is too large
        type: string
    type: object
  domain.RegistrationRequest:
    description: User registration request payload
    properties:
      email:
        description: |-
          Email address of the user.
          required: true
          format: email
          maxLength: 255
          example: john.doe@example.com
        example: john.doe@example.com
        maxLength: 255
        type: string
      name:
        description: |-
          Name of the user.
          Allows Unicode letters, spaces, hyphens, and apostrophes.
          required: true
          minLength: 2
          maxLength: 100
          pattern: "^[\\p{L}\\s\\-'\\u2019]+$"
          example: John Doe
        example: John
        maxLength: 100
        minLength: 2
        type: string
      password:
        description: |-
          Password for the user account.
          Must be at least 12 characters long.
          Must contain at least one uppercase letter, one lowercase letter, one number, and one special character from @$!%*?&.
          required: true
          minLength: 12
          maxLength: 255 // Arbitrary max length, adjust as needed
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{12,255}$"
          example: Str0ngP@ssw0rd!
        example: Str0ngP@ssw0rd!
        minLength: 12
        type: string
      password_confirmation:
        description: |-
          Password confirmation. Must match the Password field.
          required: true
          example: Str0ngP@ssw0rd!
        example: Str0ngP@ssw0rd!
        type: string
      phone:
        description: |-
          Phone number of the user in a flexible E.123-like international format.
          Must start with '+' followed by country code (1-3 digits).
          Allows spaces, parentheses, and hyphens as separators.
          required: true
          minLength: 13 // Minimum length for +38 (093) 987-65-32
          pattern: "^\\+\\d{1,3}(?:[()\\s-]*\\d+)*$"
          example: "+38 (096) 123-45-67"
        example: +38 (093) 987-65-32
        minLength: 13
        type: string
    required:
    - email
    - name
    - password
    - password_confirmation
    - phone
    type: object
  domain.SaveUnauthAppointmentRequest:
    description: Anauthorized user' appointment request
    properties:
      amount:
        example: 500
        type: number
      animal_size_id:
        example: 1
        type: integer
      appointment_date:
        example: "2025-07-22"
        type: string
      apt:
        example: "14"
        type: string
      area_id:
        example: 1
        type: integer
      city_id:
        example: 1
        type: integer
      description:
        example: Пудель, потрібен грумінг перед виставкою.
        type: string
      email:
        description: unauth user email
        example: john.doe@example.com
        maxLength: 255
        type: string
      end_time:
        example: "10:00"
        type: string
      location_type:
        type: string
      service_id:
        example: 3
        type: integer
      specialist_id:
        example: 3
        type: integer
      start_time:
        example: "08:00"
        type: string
      status:
        example: pending
        type: string
      street:
        example: вул. Володимирська
        type: string
      unit:
        example: "14"
        type: string
    required:
    - amount
    - animal_size_id
    - appointment_date
    - apt
    - area_id
    - city_id
    - description
    - email
    - end_time
    - location_type
    - service_id
    - specialist_id
    - start_time
    - status
    - street
    - unit
    type: object
  domain.SpecialistProfDTO:
    description: Specialist profile data returned to clients.
    properties:
      avatar_url:
        description: |-
          URL to the specialist's avatar image.
          format: uri
          example: https://your-cdn.com/avatars/kateryna_avatar.jpg
        type: string
      bio:
        description: |-
          Short biography or summary of the specialist.
          example: Experienced veterinarian specializing in small animal care.
        type: string
      description:
        description: |-
          Detailed description of services offered or qualifications.
          example: Provides comprehensive veterinary services including diagnostics, surgery, and preventive medicine for cats and dogs.
        type: string
      district:
        description: |-
          District where the specialist is located.
          example: Печерський
        type: string
      email:
        description: |-
          Email address of the specialist.
          format: email
          example: kateryna.walls@example.com
        type: string
      experience:
        description: |-
          Years of professional experience.
          minimum: 0
          example: 7
        type: integer
      family_name:
        description: |-
          Family name (surname) of the specialist.
          example: Walls
        type: string
      id:
        description: |-
          Unique identifier of the specialist.
          example: 123
        type: integer
      is_active:
        description: |-
          Indicates if the specialist's profile is currently active.
          example: true
        type: boolean
      is_verified:
        description: |-
          Indicates if the specialist's credentials have been verified.
          example: true
        type: boolean
      name:
        description: |-
          Given name of the specialist.
          example: Kateryna
        type: string
      phone:
        description: |-
          Phone number of the specialist in E.164 format.
          example: +380961234567
        type: string
      portfolio_urls:
        description: |-
          URLs to the specialist's portfolio images.
          format: array
          example: ["https://your-cdn.com/portfolio/image1.jpg", "https://your-cdn.com/portfolio/video1.mp4"]
        items:
          type: string
        type: array
      position:
        description: |-
          Professional position or title (e.g., "Veterinarian", "Dog Groomer").
          example: Veterinarian
        type: string
    type: object
  domain.SpecialistProfUpdateReq:
    description: Specialist profile update request payload
    properties:
      bio:
        description: |-
          Short biography or summary of the specialist.
          maxLength: 1000
          example: Experienced veterinarian specializing in small animal care.
        maxLength: 1000
        type: string
      district:
        description: |-
          District where the specialist is located.
          example: Печерський район
        type: string
      experience:
        description: |-
          Years of professional experience.
          minimum: 0
          example: 7
        minimum: 0
        type: integer
      family_name:
        description: |-
          Family name (surname) of the specialist.
          minLength: 2
          maxLength: 100
          pattern: "^[\\p{L}\\s\\-'\\u2019]+$"
          example: Walls
        maxLength: 100
        minLength: 2
        type: string
      name:
        description: |-
          Name of the specialist.
          Allows Unicode letters, spaces, hyphens, and apostrophes.
          minLength: 2
          maxLength: 100
          pattern: "^[\\p{L}\\s\\-'\\u2019]+$"
          example: Kateryna
        maxLength: 100
        minLength: 2
        type: string
      phone:
        description: |-
          Phone number of the specialist in a flexible E.123-like international format.
          Must start with '+' followed by country code (1-3 digits).
          Allows spaces, parentheses, and hyphens as separators.
          minLength: 13
          pattern: "^\\+\\d{1,3}(?:[()\\s-]*\\d+)*$"
          example: "+38 (096) 123-45-67"
        minLength: 13
        type: string
    type: object
  domain.SuccessDelete:
    properties:
      code:
        example: 204
        type: integer
      data: {}
      message:
        example: Operation was successful
        type: string
    type: object
  domain.SuccessResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: Operation was successful
        type: string
    type: object
  domain.TokensPair:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  domain.UnauthorizedError:
    properties:
      code:
        example: 401
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: Bearer token is missing or invalid
        type: string
    type: object
  domain.UnsupportedMediaTypeError:
    properties:
      code:
        example: 415
        type: integer
      details:
        items:
          $ref: '#/definitions/domain.FieldError'
        type: array
      message:
        example: The provided media type is not supported
        type: string
    type: object
  handlers.successAvatarPayload:
    properties:
      message:
        example: Avatar file uploaded successfully
        type: string
      url:
        example: https://s3.example.com/avatars/01H8XGJWBWBAQ9JDBQWEXXXXXX.jpg
        type: string
    type: object
  handlers.successPortfolioPayload:
    properties:
      message:
        example: Portfolio files uploaded successfully
        type: string
      urls_map:
        additionalProperties:
          type: string
        example:
          '"photo.jpg"': '"https://storage-provider.com/bucket/user-id/e5f6g7h8-thumbnail.jpg"}'
          '{"original_cv.webp"': '"https://storage-provider.com/bucket/user-id/a1b2c3d4-cv.webp"'
        type: object
    type: object
  handlers.successRegistration:
    properties:
      id:
        example: 100
        type: integer
      message:
        default: Registration successful
        type: string
    type: object
  handlers.successSaveUnauthAppointment:
    properties:
      id:
        example: 1
        type: integer
      message:
        default: An appointment booked successfully
        type: string
    type: object
  handlers.updateProfileSuccessResponse:
    properties:
      code:
        example: 200
        type: integer
      data:
        $ref: '#/definitions/domain.SpecialistProfDTO'
      message:
        example: Profile updated successfully.
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: petbackend-a2vg.onrender.com
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a PetHelp project backend
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
paths:
  /health:
    get:
      description: Checks if the application is running and responsive.
      produces:
      - application/json
      responses:
        "200":
          description: Application is healthy
          schema:
            $ref: '#/definitions/app.HealthCheckResponse'
        "503":
          description: Application is unhealthy or service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Performs a health check on the application
      tags:
      - System
  /oauth/{provider}:
    get:
      consumes:
      - application/json
      description: Handles the callback from an OAuth2.0 provider after user authentication.
      parameters:
      - description: OAuth2.0 provider name (e.g., google, github)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Successfully authenticated and generated tokens
          schema:
            $ref: '#/definitions/domain.TokensPair'
        "404":
          description: Account with this email not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
          description: Internal server error or failed to complete OAuth2.0 authentication
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      summary: OAuth2.0 Provider Callback
      tags:
      - OAuth
  /public-appointment-request:
    post:
      consumes:
      - application/json
      description: New  appointment booking by unauth user
      parameters:
      - description: UnauthAppointment request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.SaveUnauthAppointmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Booking appointment succeeded
          schema:
            $ref: '#/definitions/handlers.successSaveUnauthAppointment'
        "400":
          description: Invalid request payload or malformed refresh token
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "409":
          description: Conflict, choosen time already booked
          schema:
            $ref: '#/definitions/domain.ConflictError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      summary: Book un appointment
      tags:
      - SpecialistAppointment
  /specialist/avatar:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a new avatar for the authenticated specialist. The file
        should be sent as multipart/form-data with the key 'file'. The server validates
        file size (max 10MB) and type (jpeg, png, webp, heic).
      parameters:
      - description: Avatar file to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Avatar uploaded successfully
          schema:
            $ref: '#/definitions/handlers.successAvatarPayload'
        "400":
          description: 'Bad Request: file is required, extension mismatch, or other
            validation errors'
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: 'Unauthorized: User is not authenticated'
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "413":
          description: 'Payload Too Large: File size exceeds the 10MB limit'
          schema:
            $ref: '#/definitions/domain.PayloadTooLargeError'
        "415":
          description: 'Unsupported Media Type: File type is not allowed'
          schema:
            $ref: '#/definitions/domain.UnsupportedMediaTypeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload specialist avatar
      tags:
      - Specialist
  /specialist/change-password:
    patch:
      consumes:
      - application/json
      description: Allows an authenticated specialist to change their password. All
        active sessions will be terminated upon successful password change.
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.ChangePassReq'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated successfully
          schema:
            $ref: '#/definitions/domain.SuccessResponse'
        "400":
          description: Invalid request payload or validation failed
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: Unauthorized or invalid old password
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: Specialist account not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "409":
          description: 'Conflict: New password is the same as the old one'
          schema:
            $ref: '#/definitions/domain.ConflictError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Change specialist password
      tags:
      - Specialist
  /specialist/login:
    post:
      consumes:
      - application/json
      description: Login specialist
      parameters:
      - description: Login request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: Login succeeded
          schema:
            $ref: '#/definitions/domain.TokensPair'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      summary: Login
      tags:
      - Specialist
  /specialist/logout:
    post:
      consumes:
      - application/json
      description: Logs out the specialist by blacklisting the current access token,
        revoking the refresh token and clearing the session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/domain.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "500":
          description: Internal server error during logout process
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Logout specialist
      tags:
      - Specialist
  /specialist/me:
    delete:
      description: Initiates account deletion. The account will be deactivated immediately
        and permanently deleted after 7 days if not restored.
      produces:
      - application/json
      responses:
        "204":
          description: Deletion initiated successfully
          schema:
            $ref: '#/definitions/domain.SuccessDelete'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Delete specialist account (Soft Delete)
      tags:
      - Specialist
    get:
      description: Get information about the currently authenticated specialist. Requires
        a valid Bearer token.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved specialist profile
          schema:
            $ref: '#/definitions/domain.SpecialistProfDTO'
        "401":
          description: 'Unauthorized: User is not authenticated'
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: Specialist account associated with the token not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Get current specialist
      tags:
      - Specialist
  /specialist/me/status:
    patch:
      consumes:
      - application/json
      description: Allows an authenticated specialist to deactivate or activate their
        profile.
      parameters:
      - description: Profile activation/deactivation request
        in: body
        name: request
        required: true
        schema:
          properties:
            is_active:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Profile status updated successfully
          schema:
            $ref: '#/definitions/domain.SuccessResponse'
        "400":
          description: Invalid status parameter
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: Specialist account not found
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Deactivate or activate specialist profile
      tags:
      - Specialist
  /specialist/portfolio:
    post:
      consumes:
      - multipart/form-data
      description: Uploads multiple images for the authenticated specialist's portfolio.
        Files should be sent as multipart/form-data with the key 'files[]'. The server
        validates file size (max 8MB each) and type (jpeg, png, webp, heic).
      parameters:
      - description: Portfolio image files to upload
        in: formData
        name: files[]
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Portfolio files uploaded successfully
          schema:
            $ref: '#/definitions/handlers.successPortfolioPayload'
        "400":
          description: 'Bad Request: file is required, extension mismatch, or other
            validation errors'
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: 'Unauthorized: User is not authenticated'
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "413":
          description: 'Payload Too Large: File size exceeds the 10MB limit'
          schema:
            $ref: '#/definitions/domain.PayloadTooLargeError'
        "415":
          description: 'Unsupported Media Type: File type is not allowed'
          schema:
            $ref: '#/definitions/domain.UnsupportedMediaTypeError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload specialist portfolio images
      tags:
      - Specialist
  /specialist/portfolio/image:
    delete:
      description: Deletes a specific image from the authenticated specialist's portfolio.
        The full URL of the image to be deleted must be provided as a query parameter.
      parameters:
      - description: Full URL of the image to delete
        in: query
        name: url
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Image deleted successfully
          schema:
            $ref: '#/definitions/domain.SuccessResponse'
        "400":
          description: 'Bad Request: file is required, extension mismatch, or other
            validation errors'
          schema:
            $ref: '#/definitions/domain.BadRequestError'
        "401":
          description: 'Unauthorized: User is not authenticated'
          schema:
            $ref: '#/definitions/domain.UnauthorizedError'
        "404":
          description: 'Not Found: Specialist account not found'
          schema:
            $ref: '#/definitions/domain.NotFoundError'
        "500":
