name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: "1.24"
      - name: Cache golangci-lint
        uses: actions/cache@v3
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: golangci-lint-${{ runner.os }}-
      - name: Install golangci-lint
        run: |
          if [ ! -f ~/go/bin/golangci-lint ]; then
            go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          fi
      - name: Run linters
        run: ~/go/bin/golangci-lint run

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: "1.24"
      - name: Run tests
        run: go test ./...

  build-and-push:
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1) bring up the Buildx builder (container driver so credentials can be injected)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # 2) now login so the builder has your Docker Hub token
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3) build & push only your `runtime` stage
      - name: Build & push image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/teammarket-pethelp:latest
